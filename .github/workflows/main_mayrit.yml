# Despliegue de Mayrit a Azure App Service.
# Compila el frontend (Vite), lo mete en backend/static y despliega la carpeta backend.
# Autenticación: OIDC (secretos creados por el Centro de implementación de Azure).
# El servidor instala las dependencias de Python (SCM_DO_BUILD_DURING_DEPLOYMENT=1, Oryx).

name: Build and deploy Mayrit to Azure Web App - mayrit

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Varios push seguidos a main: cancela los despliegues en curso y despliega solo el ÚLTIMO commit
# (evita que se encolen builds; el último siempre incluye todo lo anterior).
concurrency:
  group: deploy-mayrit
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # requerido para el login OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copiar frontend en backend/static
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6F74D89A915D42F9B20A87BD9BCE2B6A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F08220AC6F0F4E06A232B92A8BAAB743 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8CD4E97EC1CD4BCDB4FAD6093DF8D451 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "mayrit"
          slot-name: "Production"
          package: backend
