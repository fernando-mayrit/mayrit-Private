name: Deploy Mayrit

# Despliega a Azure App Service en cada push a main (y manualmente desde la pestaña Actions).
# Requisitos en el repo (Settings → Secrets and variables → Actions):
#   - Secret  AZURE_WEBAPP_PUBLISH_PROFILE  → contenido del "Perfil de publicación" del App Service.
#   - Variable AZURE_WEBAPP_NAME             → nombre del App Service (p. ej. "mayrit").

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copiar frontend dentro del backend (backend/static)
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - name: Deploy a Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
